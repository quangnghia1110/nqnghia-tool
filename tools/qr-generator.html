<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo mã QR - NQNghia Tools</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .option-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .option-group select,
        .option-group input[type="color"] {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 10px 12px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .option-group select:focus {
            border-color: var(--accent);
        }

        .option-group input[type="color"] {
            height: 42px;
            padding: 4px 6px;
            cursor: pointer;
        }

        .input-area {
            margin-bottom: 20px;
        }

        .input-area textarea {
            width: 100%;
            min-height: 100px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: var(--accent);
        }

        .input-area textarea::placeholder {
            color: var(--text-dim);
        }

        .qr-display {
            display: flex;
            justify-content: center;
            padding: 32px;
            margin-bottom: 20px;
            background: #ffffff;
            border-radius: var(--radius);
            min-height: 120px;
            align-items: center;
        }

        .qr-display.empty {
            background: var(--bg-input);
            border: 1px dashed var(--border);
        }

        .qr-placeholder {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
        }

        #qr-container img,
        #qr-container canvas {
            display: block;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions button {
            flex: 1;
            min-width: 140px;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border) !important;
        }

        .btn-secondary:hover {
            border-color: var(--accent) !important;
            color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        @media (max-width: 520px) {
            .options-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-nav">&larr; Quay lại</a>

        <div class="download-card">
            <h1 style="margin-bottom: 6px; font-size: 1.5rem;">Tạo mã QR</h1>
            <p style="color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem;">Tạo mã QR từ văn bản hoặc đường liên kết, tải về hoặc sao chép ngay</p>

            <div class="input-area">
                <textarea id="qr-input" placeholder="Nhập nội dung hoặc URL..."></textarea>
            </div>

            <div class="options-grid">
                <div class="option-group">
                    <label>Kích thước</label>
                    <select id="qr-size">
                        <option value="128">128 &times; 128</option>
                        <option value="256" selected>256 &times; 256</option>
                        <option value="512">512 &times; 512</option>
                        <option value="1024">1024 &times; 1024</option>
                    </select>
                </div>
                <div class="option-group">
                    <label>Mức sửa lỗi</label>
                    <select id="qr-ecl">
                        <option value="L">L - Thấp (7%)</option>
                        <option value="M" selected>M - Trung bình (15%)</option>
                        <option value="Q">Q - Khá cao (25%)</option>
                        <option value="H">H - Cao (30%)</option>
                    </select>
                </div>
                <div class="option-group">
                    <label>Màu nền trước</label>
                    <input type="color" id="qr-fg" value="#000000">
                </div>
                <div class="option-group">
                    <label>Màu nền sau</label>
                    <input type="color" id="qr-bg" value="#ffffff">
                </div>
            </div>

            <div id="qr-display" class="qr-display empty">
                <div class="qr-placeholder">Mã QR sẽ hiển thị ở đây</div>
                <div id="qr-container" style="display:none;"></div>
            </div>

            <div class="actions">
                <button id="btn-png" class="btn-primary" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Tải PNG
                </button>
                <button id="btn-svg" class="btn-secondary" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Tải SVG
                </button>
                <button id="btn-copy" class="btn-success" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Sao chép ảnh
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const input = document.getElementById('qr-input');
        const sizeSelect = document.getElementById('qr-size');
        const eclSelect = document.getElementById('qr-ecl');
        const fgColor = document.getElementById('qr-fg');
        const bgColor = document.getElementById('qr-bg');
        const display = document.getElementById('qr-display');
        const container = document.getElementById('qr-container');
        const placeholder = display.querySelector('.qr-placeholder');
        const btnPng = document.getElementById('btn-png');
        const btnSvg = document.getElementById('btn-svg');
        const btnCopy = document.getElementById('btn-copy');

        let qrInstance = null;
        let debounceTimer = null;

        const eclMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateQR() {
            const text = input.value.trim();
            if (!text) {
                container.style.display = 'none';
                placeholder.style.display = '';
                display.classList.add('empty');
                btnPng.disabled = true;
                btnSvg.disabled = true;
                btnCopy.disabled = true;
                if (qrInstance) { qrInstance.clear(); qrInstance = null; container.innerHTML = ''; }
                return;
            }

            const size = parseInt(sizeSelect.value);
            container.innerHTML = '';
            container.style.display = 'block';
            placeholder.style.display = 'none';
            display.classList.remove('empty');
            display.style.background = bgColor.value;

            qrInstance = new QRCode(container, {
                text: text,
                width: size,
                height: size,
                colorDark: fgColor.value,
                colorLight: bgColor.value,
                correctLevel: eclMap[eclSelect.value]
            });

            btnPng.disabled = false;
            btnSvg.disabled = false;
            btnCopy.disabled = false;
        }

        function scheduleGenerate() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQR, 300);
        }

        input.addEventListener('input', scheduleGenerate);
        [sizeSelect, eclSelect, fgColor, bgColor].forEach(el => el.addEventListener('change', () => {
            if (input.value.trim()) generateQR();
        }));

        function getCanvas() {
            return container.querySelector('canvas');
        }

        // PNG download
        btnPng.addEventListener('click', async () => {
            const canvas = getCanvas();
            if (!canvas) return;

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'qrcode.png',
                        types: [{ description: 'Ảnh PNG', accept: { 'image/png': ['.png'] } }]
                    });
                    const writable = await handle.createWritable();
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    await writable.write(blob);
                    await writable.close();
                    showToast('Đã lưu tệp PNG thành công!');
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') return;
                }
            }

            // Fallback
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('Đã tải tệp PNG!');
        });

        // SVG download
        btnSvg.addEventListener('click', async () => {
            const canvas = getCanvas();
            if (!canvas) return;

            const size = parseInt(sizeSelect.value);
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const moduleCount = detectModuleCount(imgData, canvas.width);
            const cellSize = canvas.width / moduleCount;

            let svgRects = '';
            for (let r = 0; r < moduleCount; r++) {
                for (let c = 0; c < moduleCount; c++) {
                    const px = Math.floor(c * cellSize + cellSize / 2);
                    const py = Math.floor(r * cellSize + cellSize / 2);
                    const idx = (py * canvas.width + px) * 4;
                    const bright = imgData.data[idx] + imgData.data[idx + 1] + imgData.data[idx + 2];
                    if (bright < 384) {
                        svgRects += `<rect x="${c}" y="${r}" width="1" height="1" fill="${fgColor.value}"/>`;
                    }
                }
            }

            const svgContent = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${moduleCount} ${moduleCount}" width="${size}" height="${size}" shape-rendering="crispEdges">
<rect width="${moduleCount}" height="${moduleCount}" fill="${bgColor.value}"/>
${svgRects}
</svg>`;

            const blob = new Blob([svgContent], { type: 'image/svg+xml' });

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'qrcode.svg',
                        types: [{ description: 'Ảnh SVG', accept: { 'image/svg+xml': ['.svg'] } }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    showToast('Đã lưu tệp SVG thành công!');
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') return;
                }
            }

            // Fallback
            const link = document.createElement('a');
            link.download = 'qrcode.svg';
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('Đã tải tệp SVG!');
        });

        function detectModuleCount(imgData, w) {
            // Scan first row from top-left to find module size
            const d = imgData.data;
            // Find the quiet zone then first dark module
            let firstDark = -1;
            for (let x = 0; x < w; x++) {
                const idx = x * 4;
                if (d[idx] + d[idx + 1] + d[idx + 2] < 384) { firstDark = x; break; }
            }
            if (firstDark < 0) return 21;
            // The finder pattern top-left is 7 modules of dark-light-dark pattern
            // Measure how many pixels the first dark run is
            let runEnd = firstDark;
            for (let x = firstDark; x < w; x++) {
                const idx = x * 4;
                if (d[idx] + d[idx + 1] + d[idx + 2] >= 384) { runEnd = x; break; }
            }
            const pixelsPerModule = runEnd - firstDark;
            if (pixelsPerModule <= 0) return 21;
            return Math.round((w) / pixelsPerModule);
        }

        // Copy image
        btnCopy.addEventListener('click', async () => {
            const canvas = getCanvas();
            if (!canvas) return;
            try {
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);
                showToast('Đã sao chép ảnh vào bộ nhớ tạm!');
            } catch (e) {
                showToast('Không thể sao chép ảnh. Trình duyệt chưa hỗ trợ.', 'error');
            }
        });
    </script>
</body>
</html>
